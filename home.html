<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TWASOUL Workforce Portal</title>

  <!-- Shared header styles -->
  <link rel="stylesheet" href="header.css" />

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="home.css" />
</head>

<body>

<!-- =========================
     HEADER (SHARED)
========================== -->
<header class="pp-header" role="banner">

  <div class="skip-to-content">
    <a href="#mainContent">Skip to main content</a>
  </div>

  <div class="pp-topwhite">
    <div class="pp-topwhite-inner">

      <a class="pp-brand" href="home.html" aria-label="Home">
        <img class="pp-brand-logo" src="assets/images/02.png" alt="TWASOUL" />
      </a>

      <div class="pp-topwhite-right">

        <div class="pp-pillbar">
          <a class="pp-pill" href="#">Chat</a>
          <a class="pp-pill" href="#">
            Inbox <span class="pp-badge">0</span>
          </a>
        </div>

        <div class="pp-topwhite-search">
          <input class="pp-search-input" type="search" placeholder="Search in portal" />
        </div>

        <div class="pp-profile">
          <button class="pp-avatar-btn" id="ppAvatarBtn">
            <img id="ppAvatarImg" class="pp-avatar-img" src="assets/images/profile-avatar.png" />
          </button>

          <div class="pp-popover" id="ppProfilePopover">
            <div class="pp-popover-top">
              <div class="pp-popover-photo">
                <img id="ppAvatarImgLarge" src="assets/images/profile-avatar.png" />
              </div>

              <div class="pp-popover-meta">
                <div class="pp-popover-name">Said Abdallah Othman</div>
                <div class="pp-popover-sub">WFM</div>
                <div class="pp-popover-sub2">Real Time Management Officer</div>
              </div>
            </div>

            <div class="pp-popover-footer">
              <a href="#" class="pp-footlink">Preferences</a>
              <a href="#" class="pp-footlink">My Files</a>
              <a href="#" class="pp-footlink pp-footlink-danger">Logout</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="pp-navbar">
    <div class="pp-navbar-inner">

      <button class="pp-nav-toggle" aria-controls="ppNav">
        <span class="pp-nav-toggle-bar"></span>
        <span class="pp-nav-toggle-bar"></span>
        <span class="pp-nav-toggle-bar"></span>
      </button>

      <div id="ppNav" class="pp-nav-collapse">
        <nav class="pp-menu">
          <ul class="pp-menu-root">
            <li class="pp-item">
              <a class="pp-link pp-home" href="home.html">⌂</a>
            </li>
            <li class="pp-item"><a class="pp-link is-active" href="home.html">Home</a></li>
            <li class="pp-item"><a class="pp-link" href="dashboard/index.html">Dashboard</a></li>
            <li class="pp-item"><a class="pp-link" href="#">WFM</a></li>
            <li class="pp-item"><a class="pp-link" href="#">My Request</a></li>
            <li class="pp-item"><a class="pp-link" href="#">Operational Activities</a></li>
            <li class="pp-item"><a class="pp-link" href="#">Performance</a></li>
          </ul>
        </nav>
      </div>

      <nav class="pp-crumbbar" id="ppHeaderCrumb"></nav>

    </div>
  </div>

</header>

<!-- =========================
     MAIN CONTENT
========================== -->
<main id="mainContent">

<div id="wfm-home" class="wfm-home">

</div>

</main>

========================== -->

</body>
</html>
